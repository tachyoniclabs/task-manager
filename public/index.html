<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #1e293b;
      min-height: 100vh;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 700;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-primary:hover { background: #4338ca; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      color: #64748b;
    }

    .filter-btn:hover { border-color: #cbd5e1; }
    .filter-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }

    .task-list {
      background: white;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: #94a3b8;
    }

    .task-item {
      padding: 14px 16px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: #f8fafc; }

    .task-item.completed .task-title {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .task-item.completed .task-description { opacity: 0.5; }

    .priority-bar {
      width: 4px;
      height: 36px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .priority-bar.high { background: #ef4444; }
    .priority-bar.medium { background: #f59e0b; }
    .priority-bar.low { background: #22c55e; }

    .task-info { flex: 1; min-width: 0; }

    .task-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-description {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-badges {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge.high { background: #fef2f2; color: #ef4444; }
    .badge.medium { background: #fffbeb; color: #f59e0b; }
    .badge.low { background: #f0fdf4; color: #22c55e; }
    .badge.pending { background: #f1f5f9; color: #64748b; }
    .badge.in_progress { background: #eff6ff; color: #3b82f6; }
    .badge.completed { background: #f0fdf4; color: #22c55e; }

    .task-delete {
      background: none;
      border: none;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .task-delete:hover { color: #ef4444; background: #fef2f2; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h2 { font-size: 18px; }

    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #94a3b8;
      padding: 4px;
    }

    .modal-close:hover { color: #1e293b; }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #475569;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: #1e293b;
      background: white;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .form-group textarea { resize: vertical; min-height: 60px; }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group { flex: 1; }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    .btn-secondary {
      background: white;
      color: #64748b;
      border: 1px solid #e2e8f0;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-secondary:hover { background: #f8fafc; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>My Tasks</h1>
      <button class="btn-primary" onclick="openModal()">+ Add Task</button>
    </header>

    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" data-filter="pending" onclick="setFilter('pending', this)">Pending</button>
      <button class="filter-btn" data-filter="in_progress" onclick="setFilter('in_progress', this)">In Progress</button>
      <button class="filter-btn" data-filter="completed" onclick="setFilter('completed', this)">Completed</button>
    </div>

    <div class="task-list" id="taskList"></div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOnBackdrop(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Task</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="taskForm" onsubmit="handleSubmit(event)">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" required placeholder="What needs to be done?">
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Optional details..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="dueDate">Due Date</label>
          <input type="date" id="dueDate">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary" id="submitBtn">Add Task</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = '/api/tasks';
    let currentFilter = 'all';

    async function fetchTasks() {
      const params = currentFilter !== 'all' ? `?status=${currentFilter}` : '';
      const response = await fetch(`${API}${params}`);
      const data = await response.json();
      renderTasks(data.tasks);
    }

    function createTextElement(tag, text, className) {
      const el = document.createElement(tag);
      el.textContent = text;
      if (className) el.className = className;
      return el;
    }

    function renderTasks(tasks) {
      const list = document.getElementById('taskList');
      list.replaceChildren();

      if (tasks.length === 0) {
        list.appendChild(createTextElement('div', 'No tasks yet. Click "+ Add Task" to get started.', 'empty-state'));
        return;
      }

      tasks.forEach(task => {
        const item = document.createElement('div');
        item.className = `task-item${task.status === 'completed' ? ' completed' : ''}`;
        item.onclick = () => openModal(task.id);

        const priorityBar = document.createElement('div');
        priorityBar.className = `priority-bar ${task.priority}`;
        item.appendChild(priorityBar);

        const info = document.createElement('div');
        info.className = 'task-info';
        info.appendChild(createTextElement('div', task.title, 'task-title'));
        if (task.description) {
          info.appendChild(createTextElement('div', task.description, 'task-description'));
        }
        item.appendChild(info);

        const badges = document.createElement('div');
        badges.className = 'task-badges';
        badges.appendChild(createTextElement('span', capitalize(task.priority), `badge ${task.priority}`));
        badges.appendChild(createTextElement('span', formatStatus(task.status), `badge ${task.status}`));
        item.appendChild(badges);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'task-delete';
        deleteBtn.title = 'Delete';
        deleteBtn.textContent = '\u00D7';
        deleteBtn.onclick = (e) => deleteTask(e, task.id);
        item.appendChild(deleteBtn);

        list.appendChild(item);
      });
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fetchTasks();
    }

    function openModal(taskId) {
      const form = document.getElementById('taskForm');
      form.reset();
      document.getElementById('taskId').value = '';
      document.getElementById('modalTitle').textContent = 'Add Task';
      document.getElementById('submitBtn').textContent = 'Add Task';
      document.getElementById('priority').value = 'medium';

      if (taskId) {
        loadTaskIntoForm(taskId);
      }

      document.getElementById('modalBackdrop').classList.add('open');
    }

    async function loadTaskIntoForm(taskId) {
      const response = await fetch(`${API}/${taskId}`);
      const task = await response.json();

      document.getElementById('taskId').value = task.id;
      document.getElementById('title').value = task.title;
      document.getElementById('description').value = task.description || '';
      document.getElementById('status').value = task.status;
      document.getElementById('priority').value = task.priority;
      document.getElementById('dueDate').value = task.due_date || '';
      document.getElementById('modalTitle').textContent = 'Edit Task';
      document.getElementById('submitBtn').textContent = 'Save Changes';
    }

    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('open');
    }

    function closeModalOnBackdrop(event) {
      if (event.target === event.currentTarget) closeModal();
    }

    async function handleSubmit(event) {
      event.preventDefault();
      const taskId = document.getElementById('taskId').value;
      const body = {
        title: document.getElementById('title').value.trim(),
        description: document.getElementById('description').value.trim() || null,
        status: document.getElementById('status').value,
        priority: document.getElementById('priority').value,
        due_date: document.getElementById('dueDate').value || null,
      };

      const url = taskId ? `${API}/${taskId}` : API;
      const method = taskId ? 'PUT' : 'POST';

      await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      closeModal();
      fetchTasks();
    }

    async function deleteTask(event, taskId) {
      event.stopPropagation();
      if (!confirm('Delete this task?')) return;
      await fetch(`${API}/${taskId}`, { method: 'DELETE' });
      fetchTasks();
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function formatStatus(status) {
      return status.split('_').map(capitalize).join(' ');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    fetchTasks();
  </script>
</body>
</html>
